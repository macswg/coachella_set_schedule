<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f0f0f">
    <title>{% block title %}Festival Schedule{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10/dist/ext/ws.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/static/styles.css?v={{ app_version }}">
    <script src="/static/schedule_utils.js?v={{ app_version }}"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
    {% block content %}{% endblock %}
    <footer style="text-align:center;padding:1rem 0 0.5rem;color:var(--text-muted);font-size:0.65rem;opacity:0.5;">v{{ app_version }}</footer>
    <script>
        // Fallback reload handler for pages without scheduleApp (e.g. /stage).
        // scheduleApp.setupBrightnessListener() handles reload on /, /edit, /preview.
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof scheduleApp === 'undefined') {
                document.body.addEventListener('htmx:wsBeforeMessage', function(event) {
                    try {
                        if (JSON.parse(event.detail.message).type === 'reload') {
                            window.location.reload();
                        }
                    } catch (e) {}
                });
            }
        });
    </script>
</body>
</html>
