{% extends "base.html" %}

{% block title %}{{ stage_name }} - Stage Display{% endblock %}

{% block content %}
<div class="stage-display" x-data="stageApp()" x-init="init()">

    <!-- Header card — same structure as main display -->
    <header class="header stage-header">
        <div class="header-left">
            <h1>{{ stage_name }}</h1>
            {% if current_show %}<div class="show-name-label">{{ current_show }}</div>{% endif %}
            <div class="server-status">
                <span class="server-status-dot" :class="{ 'offline': !serverOnline }"></span>
                <span class="server-status-label" :style="serverOnline ? 'color: #44ff44' : 'color: #ff4444'" x-text="serverOnline ? 'Live Data' : 'Offline Data - DO NOT REFRESH'"></span>
            </div>
        </div>
        <div class="header-center">
            <div class="stage-tod-label-text">Current Time:</div>
            <div class="current-time" x-text="currentTime"></div>
        </div>
        <div class="header-right">
            <button id="fullscreen-btn" onclick="toggleFullscreen()" title="Enter fullscreen" style="background:none;border:1px solid #555;color:#aaa;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:0.85rem;">⛶ Fullscreen</button>
        </div>
    </header>

    <!-- Now Playing / Up Next card — same structure as main display -->
    <section class="now-playing-section stage-np-section" id="stage-up-next"></section>

    <!-- Load In card — shown when active -->
    <div class="stage-lower-sections" id="stage-lower-sections" style="display:none">
        <section class="now-playing-section stage-lower-card" id="stage-load-in"></section>
    </div>

    <!-- Hidden schedule list kept in sync via WebSocket -->
    <div style="display:none" hx-ext="ws" ws-connect="/ws?mode=view">
        <div class="schedule-list" id="schedule-list">
            {% for act in acts %}
                {% include "components/act_row.html" %}
            {% endfor %}
        </div>
    </div>
</div>

<script>
function stageApp() {
    return {
        currentTime: '',
        serverOnline: false,
        clockOffsetMs: 0,

        async syncClock() {
            try {
                const before = Date.now();
                const res = await fetch('/api/time');
                const after = Date.now();
                const { epoch_ms } = await res.json();
                const clientMidpoint = Math.round((before + after) / 2);
                this.clockOffsetMs = epoch_ms - clientMidpoint;
            } catch (e) {
                console.warn('Clock sync failed:', e);
            }
        },

        init() {
            this.syncClock().then(() => this.updateTime());
            setInterval(() => this.updateTime(), 1000);
            setInterval(() => this.syncClock(), 60000);
            document.body.addEventListener('htmx:wsAfterMessage', () => this.updateTime());
            document.body.addEventListener('htmx:wsOpen', () => { this.serverOnline = true; });
            document.body.addEventListener('htmx:wsClose', () => { this.serverOnline = false; });
            window.addEventListener('beforeunload', (e) => {
                if (!this.serverOnline) e.preventDefault();
            });
        },

        updateTime() {
            const now = new Date(Date.now() + this.clockOffsetMs);
            this.currentTime = now.toLocaleTimeString('en-US', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false,
                timeZone: '{{ timezone }}'
            });

            let currentSecs = timeToSeconds(this.currentTime);
            const acts = [];
            document.querySelectorAll('.act-row').forEach(row => {
                acts.push({
                    name: row.querySelector('.act-name') ? row.querySelector('.act-name').textContent.trim() : '',
                    scheduledStart: timeToSeconds(row.dataset.scheduledStart),
                    scheduledEnd: timeToSeconds(row.dataset.scheduledEnd),
                    scheduledStartTime: row.dataset.scheduledStart,
                    scheduledEndTime: row.dataset.scheduledEnd,
                    actualStart: timeToSeconds(row.dataset.actualStart),
                    actualStartTime: row.dataset.actualStart,
                    actualEnd: timeToSeconds(row.dataset.actualEnd),
                    hasActualStart: row.dataset.actualStart !== '',
                    hasActualEnd: row.dataset.actualEnd !== '',
                    isLoadIn: row.dataset.isLoadin === 'true',
                    isOnDeck: row.dataset.isOndeck === 'true',
                    isPreshow: row.dataset.isPreshow === 'true',
                    isEndOfShow: row.dataset.isEndofshow === 'true',
                });
            });

            currentSecs = normalizeActTimes(currentSecs, acts);
            this.updateDisplay(currentSecs, acts);
        },

        formatActName(name) {
            const colonIdx = name.indexOf(':');
            if (colonIdx !== -1) {
                const prefix = name.slice(0, colonIdx + 1);
                const rest = name.slice(colonIdx + 1).trim();
                return `<span class="np-artist-prefix">${prefix}</span>${rest}`;
            }
            return name;
        },

        updateDisplay(currentSecs, acts) {
            const section = document.getElementById('stage-up-next');
            if (!section) return;

            let nowPlaying = null;
            let nowPlayingActualStart = '';
            let nowPlayingScheduledEnd = '';
            let upNext = null;
            let upNextStartTime = '';
            let countdown = '';
            let isOvertime = false;
            let isLateStart = false;
            let isChangeover = false;
            let isOnDeck = false;
            let countdownSuffix = 'until start';

            let shouldBePlayingNow = null;
            let nextUpcoming = null;
            let seenAnyAct = false;
            let endOfShowReached = false;

            for (const act of acts) {
                if (act.isLoadIn) continue;

                if (act.isEndOfShow) {
                    const eosHasTime = act.scheduledStart !== null;
                    if (eosHasTime && currentSecs >= act.scheduledStart) {
                        endOfShowReached = true;
                    } else if (!eosHasTime && seenAnyAct) {
                        endOfShowReached = true;
                    } else if (eosHasTime && !nextUpcoming) {
                        nextUpcoming = {
                            name: act.name,
                            startSecs: act.scheduledStart,
                            startTime: act.scheduledStartTime,
                            isChangeover: false,
                            isOnDeck: false,
                            isEndOfShow: true,
                        };
                    }
                    break;
                }

                if (!act.isOnDeck && !act.isPreshow) {
                    // Regular Set act: check if currently playing
                    if (act.hasActualStart && !act.hasActualEnd) {
                        nowPlaying = act.name;
                        nowPlayingActualStart = act.actualStartTime;
                        nowPlayingScheduledEnd = act.scheduledEndTime;
                        if (act.scheduledEnd !== null) {
                            const remaining = act.scheduledEnd - currentSecs;
                            countdown = formatCountdown(remaining);
                            isOvertime = remaining < 0;
                        }
                        break;
                    }
                    if (act.hasActualEnd) { seenAnyAct = true; continue; }
                }

                // Active window: preshow runs on schedule (time-based), On Deck and regular acts use actual times
                const inWindow = act.scheduledStart !== null &&
                    currentSecs >= act.scheduledStart &&
                    (act.scheduledEnd === null || currentSecs < act.scheduledEnd);
                if (inWindow && !shouldBePlayingNow) {
                    if (act.isPreshow) {
                        shouldBePlayingNow = {
                            name: act.name,
                            startSecs: act.scheduledStart,
                            endSecs: act.scheduledEnd,
                            startTime: act.scheduledStartTime,
                            isPreshow: true,
                            isOnDeck: false,
                            isChangeover: false,
                        };
                    } else if (!act.hasActualStart) {
                        shouldBePlayingNow = {
                            name: act.name,
                            startSecs: act.scheduledStart,
                            endSecs: act.scheduledEnd,
                            startTime: act.scheduledStartTime,
                            isPreshow: false,
                            isChangeover: act.isOnDeck ? false : seenAnyAct,
                            isOnDeck: act.isOnDeck,
                        };
                    }
                }

                // Upcoming
                if (!act.isPreshow && !act.hasActualStart && currentSecs < act.scheduledStart && !nextUpcoming) {
                    nextUpcoming = {
                        name: act.name,
                        startSecs: act.scheduledStart,
                        startTime: act.scheduledStartTime,
                        isChangeover: act.isOnDeck ? false : seenAnyAct,
                        isOnDeck: act.isOnDeck,
                        isEndOfShow: false,
                    };
                }

                if (!act.isOnDeck && !act.isPreshow) seenAnyAct = true;
            }

            let startingSoon = false;
            let isEndOfShow = false;

            // Preshow active: render combined preshow + up-next card then bail out to DOM update
            const existingDiv = section.firstElementChild;
            if (!nowPlaying && shouldBePlayingNow?.isPreshow) {
                const nextName = nextUpcoming?.name || null;
                const secsUntilNext = nextUpcoming ? nextUpcoming.startSecs - currentSecs : null;
                const nextCountdown = secsUntilNext !== null ? formatCountdown(secsUntilNext) : '';
                const preshowArtist = shouldBePlayingNow.name;
                const sameCard = existingDiv?.classList.contains('preshow-playing')
                    && existingDiv.querySelector('.np-preshow-artist')?.textContent === preshowArtist;
                if (sameCard) {
                    const cd = existingDiv.querySelector('.np-countdown');
                    if (cd) cd.textContent = nextCountdown;
                } else {
                    section.innerHTML = `
                        <div class="preshow-playing">
                            <div class="np-preshow-header">
                                <span class="np-preshow-tag">Preshow</span>
                                <span class="np-preshow-artist">${preshowArtist}</span>
                            </div>
                            ${nextName ? `
                            <div class="np-preshow-upnext">
                                <span class="np-label">Up Next</span>
                                <span class="np-artist">${nextName}</span>
                                <div class="np-countdown-wrap">
                                    <span class="np-countdown">${nextCountdown}</span>
                                    <span class="np-suffix">until start</span>
                                </div>
                            </div>` : ''}
                        </div>`;
                }
                this.fitCardToSection();
                // Load In lower card (handled below)
                const loadInAct = acts.find(a =>
                    a.isLoadIn && a.scheduledStart !== null &&
                    currentSecs >= a.scheduledStart - 10800 && currentSecs < a.scheduledStart + 3600
                );
                const hasLower = !!loadInAct;
                section.classList.toggle('stage-np-compact', hasLower);
                document.getElementById('stage-lower-sections').style.display = hasLower ? 'flex' : 'none';
                const loadInEl = document.getElementById('stage-load-in');
                if (loadInAct) {
                    loadInEl.innerHTML = `<div class="stage-lower-card-inner stage-load-in-card"><span class="np-label">Load In</span><span class="np-artist">${loadInAct.name}</span><span class="stage-lower-times">${loadInAct.scheduledStartTime}</span></div>`;
                } else {
                    loadInEl.innerHTML = '';
                }
                return;
            }

            if (!nowPlaying && shouldBePlayingNow) {
                upNext = shouldBePlayingNow.name;
                upNextStartTime = shouldBePlayingNow.startTime;
                isChangeover = shouldBePlayingNow.isChangeover;
                isOnDeck = shouldBePlayingNow.isOnDeck;
                if (isOnDeck) {
                    countdown = formatCountdown(shouldBePlayingNow.endSecs - currentSecs);
                    countdownSuffix = 'remaining';
                } else {
                    countdown = formatCountdown(-(currentSecs - shouldBePlayingNow.startSecs));
                    isLateStart = true;
                    countdownSuffix = 'late';
                }
            } else if (!nowPlaying && nextUpcoming) {
                upNext = nextUpcoming.name;
                upNextStartTime = nextUpcoming.startTime;
                isEndOfShow = nextUpcoming.isEndOfShow || false;
                countdown = formatCountdown(nextUpcoming.startSecs - currentSecs);
                isChangeover = nextUpcoming.isChangeover;
                isOnDeck = nextUpcoming.isOnDeck;
                const secsUntilStart = nextUpcoming.startSecs - currentSecs;
                startingSoon = !isOnDeck && !isEndOfShow && secsUntilStart > 0 && secsUntilStart <= 120;
            }

            // Avoid rebuilding innerHTML every tick to preserve CSS animations
            if (nowPlaying) {
                const cl = `now-playing${isOvertime ? ' is-overtime' : ''}`;
                const hasCountdown = countdown !== '';
                const sameCard = existingDiv?.classList.contains('now-playing')
                    && existingDiv.querySelector('.np-artist')?.textContent === nowPlaying
                    && !!existingDiv.querySelector('.np-countdown-wrap') === hasCountdown;
                if (sameCard) {
                    existingDiv.className = cl;
                    if (hasCountdown) {
                        const cd = existingDiv.querySelector('.np-countdown');
                        if (cd) { cd.className = `np-countdown${isOvertime ? ' overtime' : ''}`; cd.textContent = countdown; }
                        const sf = existingDiv.querySelector('.np-suffix');
                        if (sf) sf.textContent = isOvertime ? 'over' : 'remaining';
                    }
                } else {
                    const countdownHtml = hasCountdown ? `
                            <div class="np-countdown-wrap">
                                <span class="np-countdown${isOvertime ? ' overtime' : ''}">${countdown}</span>
                                <span class="np-suffix">${isOvertime ? 'over' : 'remaining'}</span>
                            </div>` : '';
                    const timesHtml = `
                            <div class="np-act-times">
                                <span class="np-act-times-item"><span class="np-act-times-label">Started:</span> ${nowPlayingActualStart}</span>
                                ${nowPlayingScheduledEnd ? `<span class="np-act-times-sep">·</span><span class="np-act-times-item"><span class="np-act-times-label">Ends:</span> ${nowPlayingScheduledEnd}</span>` : ''}
                            </div>`;
                    section.innerHTML = `
                        <div class="${cl}">
                            <span class="np-label">Now Playing</span>
                            <span class="np-artist">${nowPlaying}</span>
                            ${countdownHtml}
                            ${timesHtml}
                        </div>`;
                }
            } else if (endOfShowReached || (upNext && isEndOfShow)) {
                if (!existingDiv?.classList.contains('end-of-show-card')) {
                    section.innerHTML = `
                        <div class="end-of-show-card">
                            <span class="np-label">END OF SHOW</span>
                            <span class="np-artist">Have a Great Night</span>
                        </div>`;
                }
            } else if (upNext) {
                const cl = `up-next${isLateStart ? ' is-late-start' : ''}${isChangeover ? ' is-changeover' : ''}${isOnDeck ? ' is-on-deck' : ''}`;
                const sameCard = existingDiv?.classList.contains('up-next')
                    && existingDiv.querySelector('.np-artist')?.textContent === upNext
                    && existingDiv.classList.contains('is-late-start') === isLateStart
                    && existingDiv.classList.contains('is-changeover') === isChangeover
                    && existingDiv.classList.contains('is-on-deck') === isOnDeck;
                if (sameCard) {
                    existingDiv.classList.toggle('starting-soon', startingSoon);
                    const cd = existingDiv.querySelector('.np-countdown');
                    if (cd) cd.textContent = countdown;
                    const sf = existingDiv.querySelector('.np-suffix');
                    if (sf) sf.textContent = countdownSuffix;
                    const lbl = existingDiv.querySelector('.np-label');
                    if (lbl && isOnDeck) lbl.textContent = countdownSuffix === 'remaining' ? 'On Deck' : 'Up Next';
                } else if (isOnDeck) {
                    section.innerHTML = `
                        <div class="${cl}">
                            <span class="np-label">${countdownSuffix === 'remaining' ? 'On Deck' : 'Up Next'}</span>
                            <span class="np-artist">${this.formatActName(upNext)}</span>
                            <span class="stage-start-time"><span class="stage-start-time-label">Scheduled Start:</span> <span class="stage-start-time-value">${upNextStartTime}</span></span>
                            <div class="np-countdown-wrap">
                                <span class="np-countdown">${countdown}</span>
                                <span class="np-suffix">${countdownSuffix}</span>
                            </div>
                        </div>`;
                } else {
                    section.innerHTML = `
                        <div class="${cl}${startingSoon ? ' starting-soon' : ''}">
                            ${isChangeover ? '<span class="np-changeover">CHANGEOVER</span>' : ''}
                            ${(!isChangeover || isLateStart) ? `<span class="np-label">${isLateStart ? 'Should Be On' : 'Up Next'}</span>` : ''}
                            <span class="np-artist">${upNext}</span>
                            <span class="stage-start-time"><span class="stage-start-time-label">Scheduled Start:</span> <span class="stage-start-time-value">${upNextStartTime}</span></span>
                            <div class="np-countdown-wrap">
                                <span class="np-countdown${isLateStart ? ' late-start' : ''}">${countdown}</span>
                                <span class="np-suffix">${countdownSuffix}</span>
                            </div>
                        </div>`;
                }
            } else {
                section.innerHTML = '';
            }

            this.fitCardToSection();

        // Load In lower card
            const loadInAct = acts.find(a =>
                a.isLoadIn && a.scheduledStart !== null &&
                currentSecs >= a.scheduledStart - 10800 && currentSecs < a.scheduledStart + 3600
            );
            const hasLower = !!loadInAct;
            section.classList.toggle('stage-np-compact', hasLower);
            document.getElementById('stage-lower-sections').style.display = hasLower ? 'flex' : 'none';

            const loadInEl = document.getElementById('stage-load-in');
            if (loadInAct) {
                loadInEl.innerHTML = `<div class="stage-lower-card-inner stage-load-in-card"><span class="np-label">Load In</span><span class="np-artist">${loadInAct.name}</span><span class="stage-lower-times">${loadInAct.scheduledStartTime}</span></div>`;
            } else {
                loadInEl.innerHTML = '';
            }
        },

        fitCardToSection() {
            const section = document.getElementById('stage-up-next');
            if (!section) return;
            const card = section.firstElementChild;
            if (!card) return;

            // Reset before measuring so we get natural dimensions
            card.style.transform = 'none';
            card.style.transformOrigin = 'center center';

            // scrollWidth/Height capture content that overflows the box
            const scaleX = card.clientWidth / card.scrollWidth;
            const scaleY = section.clientHeight / card.scrollHeight;
            const scale = Math.min(scaleX, scaleY, 1);

            if (scale < 0.99) {
                card.style.transform = `scale(${scale})`;
            }
        },

    }
}

function toggleFullscreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

document.addEventListener('fullscreenchange', () => {
    const btn = document.getElementById('fullscreen-btn');
    if (btn) btn.style.display = document.fullscreenElement ? 'none' : '';
});

document.addEventListener('keydown', (e) => {
    if (e.key === 'f' || e.key === 'F') toggleFullscreen();
});

(function () {
    let hideTimer;
    function showCursor() {
        document.body.style.cursor = '';
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => { document.body.style.cursor = 'none'; }, 3000);
    }
    document.addEventListener('mousemove', showCursor);
    showCursor();
})();
</script>
{% endblock %}
